name: 🐳 Build & Push Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - master
  # Bisa trigger manual dari GitHub Actions tab
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image ke Docker Hub?'
        required: true
        default: 'true'
        type: boolean

# Hanya jalankan satu workflow pada satu waktu untuk branch yang sama
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Username Docker Hub
  DOCKER_USERNAME: azzamdev17
  IMAGE_NAME: minecraft-egg
  REGISTRY: docker.io

jobs:
  # ============================================================
  # JOB 1: Validasi & Lint
  # ============================================================
  validate:
    name: 🔍 Validasi File
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ✅ Validasi egg JSON
        run: |
          echo "Memvalidasi egg-minecraft-universal.json..."
          python3 -c "
          import json, sys
          try:
              with open('egg-minecraft-universal.json', 'r') as f:
                  data = json.load(f)
              # Cek field wajib
              required = ['name', 'author', 'startup', 'variables', 'docker_images']
              for field in required:
                  if field not in data:
                      print(f'ERROR: Field wajib tidak ditemukan: {field}')
                      sys.exit(1)
              print(f'✅ Egg JSON valid!')
              print(f'   Nama: {data[\"name\"]}')
              print(f'   Author: {data[\"author\"]}')
              print(f'   Jumlah variabel: {len(data[\"variables\"])}')
              print(f'   Docker images: {len(data[\"docker_images\"])}')
          except json.JSONDecodeError as e:
              print(f'ERROR: JSON tidak valid: {e}')
              sys.exit(1)
          "

      - name: 🔍 Lint Bash scripts
        run: |
          # Install shellcheck
          sudo apt-get install -y shellcheck
          echo "Memeriksa install.sh..."
          shellcheck install.sh || true
          echo "Memeriksa entrypoint.sh..."
          shellcheck entrypoint.sh || true

      - name: 📋 Tampilkan informasi egg
        run: |
          echo "### 📦 Egg Info" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python3 -c "
          import json
          with open('egg-minecraft-universal.json') as f:
              data = json.load(f)
          print(f'| Field | Value |')
          print(f'|-------|-------|')
          print(f'| Name | {data[\"name\"]} |')
          print(f'| Author | {data[\"author\"]} |')
          print(f'| Variables | {len(data[\"variables\"])} |')
          print(f'| Server Types | vanilla, paper, purpur, spigot, forge, fabric, quilt, bungeecord, waterfall, velocity |')
          " >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 2: Build Docker Image
  # ============================================================
  build:
    name: 🔨 Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - java_version: "21"
            tag_suffix: "java21"
            description: "Java 21 untuk MC 1.20.5+"
          - java_version: "17"
            tag_suffix: "java17"
            description: "Java 17 untuk MC 1.17 - 1.20.4"
          - java_version: "11"
            tag_suffix: "java11"
            description: "Java 11 untuk MC 1.12 - 1.16.5"
          - java_version: "8"
            tag_suffix: "java8"
            description: "Java 8 untuk MC 1.8 - 1.12.2"

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🖥️ Tampilkan info runner
        run: |
          echo "Runner: ${{ runner.os }}"
          echo "CPU: $(nproc) cores"
          echo "RAM: $(free -h | grep Mem | awk '{print $2}')"
          echo "Disk: $(df -h / | tail -1 | awk '{print $4}') tersedia"

      - name: 🐳 Setup QEMU (untuk multi-platform build)
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest

      - name: 🔑 Login ke Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏷️ Extract metadata untuk Docker tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            azzamdev17/${{ env.IMAGE_NAME }}
          tags: |
            # Tag berdasarkan versi Java
            type=raw,value=${{ matrix.tag_suffix }}
            # Tag dengan versi release: v1.2.3 -> 1.2.3-java21
            type=semver,pattern={{version}},suffix=-${{ matrix.tag_suffix }}
            # Tag major: v1 -> 1-java21
            type=semver,pattern={{major}},suffix=-${{ matrix.tag_suffix }}
            # Tag latest hanya untuk Java 21
            type=raw,value=latest,enable=${{ matrix.java_version == '21' }}
            # Tag edge untuk push ke main
            type=raw,value=edge-${{ matrix.tag_suffix }},enable={{is_default_branch}}

      - name: 🏗️ Build dan Push Docker Image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # Push hanya jika bukan PR
          push: ${{ github.event_name != 'pull_request' }}
          # Build untuk amd64 dan arm64
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.java-version=${{ matrix.java_version }}
          # Cache dari GitHub Actions
          cache-from: type=gha,scope=${{ matrix.tag_suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag_suffix }}
          # Build args
          build-args: |
            JAVA_VERSION=${{ matrix.java_version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: 📊 Tampilkan hasil build
        if: github.event_name != 'pull_request'
        run: |
          echo "### 🐳 Docker Build Selesai - ${{ matrix.description }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Java Version** | ${{ matrix.java_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ matrix.tag_suffix }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Digest** | \`${{ steps.build-push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Platforms** | linux/amd64, linux/arm64 |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 3: Release - Buat GitHub Release otomatis
  # ============================================================
  release:
    name: 📦 Buat GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📝 Generate changelog
        id: changelog
        run: |
          # Ambil tag sebelumnya
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "${{ github.ref_name }}" | head -1 || echo "")
          CURRENT_TAG="${{ github.ref_name }}"

          echo "Tag sekarang: $CURRENT_TAG"
          echo "Tag sebelumnya: $PREV_TAG"

          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..${CURRENT_TAG} 2>/dev/null || echo "- Update terbaru")
          else
            CHANGES="- Rilis perdana Pterodactyl Minecraft Universal Egg"
          fi

          # Tulis ke file
          cat > CHANGELOG.md << EOF
          ## 🎮 Pterodactyl Minecraft Universal Egg ${CURRENT_TAG}

          ### Perubahan
          ${CHANGES}

          ### 🐳 Docker Images
          | Tag | Deskripsi |
          |-----|-----------|
          | \`latest\` | Java 21 - Untuk MC 1.20.5+ |
          | \`java21\` | Java 21 - Untuk MC 1.20.5+ |
          | \`java17\` | Java 17 - Untuk MC 1.17 - 1.20.4 |
          | \`java11\` | Java 11 - Untuk MC 1.12 - 1.16.5 |
          | \`java8\` | Java 8 - Untuk MC 1.8 - 1.12.2 |

          ### 📋 Cara Install
          1. Download file \`egg-minecraft-universal.json\`
          2. Buka Pterodactyl Panel → Admin → Nests → Import Egg
          3. Upload file JSON dan konfigurasi sesuai kebutuhan

          ### 🌐 Server Types yang Didukung
          \`vanilla\` • \`paper\` • \`purpur\` • \`spigot\` • \`forge\` • \`fabric\` • \`quilt\` • \`bungeecord\` • \`waterfall\` • \`velocity\`
          EOF

          echo "changelog_file=CHANGELOG.md" >> $GITHUB_OUTPUT

      - name: 🚀 Buat GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "🎮 Minecraft Universal Egg ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            egg-minecraft-universal.json
            install.sh
            entrypoint.sh
            Dockerfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # JOB 4: Notifikasi selesai
  # ============================================================
  notify:
    name: 📢 Notifikasi
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: always()

    steps:
      - name: 📊 Rangkuman workflow
        run: |
          echo "## 🎯 Rangkuman Workflow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validasi | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🐳 Image tersedia di:" >> $GITHUB_STEP_SUMMARY
          echo "- \`docker pull azzamdev17/minecraft-egg:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`docker pull azzamdev17/minecraft-egg:java21\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`docker pull azzamdev17/minecraft-egg:java17\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`docker pull azzamdev17/minecraft-egg:java11\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`docker pull azzamdev17/minecraft-egg:java8\`" >> $GITHUB_STEP_SUMMARY
